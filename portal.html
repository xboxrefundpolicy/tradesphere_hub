<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tradesphere Hub – Test Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg-primary: #0A0A0A;
            --bg-card: #141414;
            --bg-input: #1E1E1E;
            --border-color: #2A2A2A;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0A0;
            --accent-gold: #F59E0B;
            --accent-gold-hover: #D97706;
            --radius: 16px;
            --shadow: 0 8px 32px rgba(0,0,0,0.5);
            --success: #10B981;
            --danger: #EF4444;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { max-width: 1200px; width:100%; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0 16px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-icon {
            background: linear-gradient(135deg, var(--accent-gold), #FBBF24);
            color: #000; width: 38px; height: 38px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 800;
        }
        .logo-text { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
        .logo-text span { color: var(--accent-gold); }
        .nav { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 8px;
            transition: 0.3s ease;
        }
        .nav a:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
        .nav a.active { color: var(--accent-gold); background: rgba(245,158,11,0.1); }

        #authScreen {
            max-width: 400px; margin: 30px auto; background: var(--bg-card);
            border: 1px solid var(--border-color); border-radius: var(--radius);
            padding: 32px 28px; box-shadow: var(--shadow);
        }
        #authScreen h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; text-align: center; }
        #authScreen p { color: var(--text-secondary); font-size: 14px; text-align: center; margin-bottom: 20px; }
        #authScreen input {
            width: 100%; padding: 14px 16px; background: var(--bg-input);
            border: 1px solid var(--border-color); border-radius: 10px;
            color: var(--text-primary); font-size: 15px; margin-bottom: 14px;
            transition: border 0.3s ease;
        }
        #authScreen input:focus { outline: none; border-color: var(--accent-gold); }
        #authScreen .auth-btn {
            width: 100%; padding: 14px; background: var(--accent-gold);
            color: #000; border: none; border-radius: 10px;
            font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s ease;
        }
        #authScreen .auth-btn:hover { background: var(--accent-gold-hover); transform: scale(1.01); }
        #authScreen .auth-error { color: var(--danger); font-size: 13px; text-align: center; margin-top: 12px; display: none; }

        #dashboard { display: none; }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
            padding-top: 16px;
        }
        .add-btn {
            background: var(--accent-gold); color: #000; border: none;
            padding: 10px 20px; border-radius: 40px; font-weight: 700; font-size: 14px;
            cursor: pointer; transition: 0.3s ease; display: flex; align-items: center; gap: 8px;
        }
        .add-btn:hover { background: var(--accent-gold-hover); transform: scale(1.02); }

        .client-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 14px;
        }
        .client-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 18px;
            transition: all 0.3s ease;
        }
        .client-card:hover { border-color: var(--accent-gold); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        .client-card .name { font-size: 17px; font-weight: 700; }
        .client-card .email { color: var(--text-secondary); font-size: 13px; margin: 4px 0; }
        .client-card .link-area {
            background: var(--bg-input);
            border-radius: 8px;
            padding: 10px 12px;
            margin: 10px 0;
            font-size: 12px;
            word-break: break-all;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .client-card .link-area a { color: var(--accent-gold); text-decoration: none; flex: 1; }
        .client-card .link-area .copy-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.3s ease;
        }
        .client-card .actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
        .client-card .upload-btn { background: rgba(245,158,11,0.12); color: var(--accent-gold); border: none; padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; transition: 0.3s ease; }
        .client-card .upload-btn:hover { background: rgba(245,158,11,0.25); }
        .client-card .delete-btn { background: rgba(239,68,68,0.08); color: var(--danger); border: none; padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; transition: 0.3s ease; }
        .client-card .delete-btn:hover { background: rgba(239,68,68,0.2); }

        .empty-state {
            text-align: center; padding: 40px 20px;
            color: var(--text-secondary);
            grid-column: 1 / -1;
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state h3 { font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(4px);
            animation: fadeIn 0.3s ease;
        }
        .modal-overlay.active { display: flex; }
        @keyframes fadeIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            max-width: 480px;
            width: 100%;
            padding: 28px 24px;
            box-shadow: var(--shadow);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .modal .subtitle { color: var(--text-secondary); font-size: 13px; margin-bottom: 16px; }
        .modal label { display: block; font-weight: 500; font-size: 13px; margin-bottom: 4px; color: var(--text-secondary); }
        .modal input {
            width: 100%;
            padding: 11px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            margin-bottom: 14px;
            transition: border 0.3s ease;
        }
        .modal input:focus { outline: none; border-color: var(--accent-gold); }
        .modal .file-upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 14px;
            transition: 0.3s ease;
            background: var(--bg-input);
        }
        .modal .file-upload-area:hover { border-color: var(--accent-gold); }
        .modal .file-upload-area .icon { font-size: 28px; margin-bottom: 2px; }
        .modal .file-upload-area p { color: var(--text-secondary); font-size: 13px; }
        .modal .file-upload-area .browse { color: var(--accent-gold); font-weight: 600; }
        .modal .file-info {
            background: rgba(245,158,11,0.06);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            margin-bottom: 14px;
            display: none;
            align-items: center;
            justify-content: space-between;
        }
        .modal .file-info.visible { display: flex; }
        .modal .file-info .remove { color: var(--danger); cursor: pointer; }
        .modal .btn-group { display: flex; gap: 10px; margin-top: 4px; }
        .modal .btn-group .submit-btn {
            flex: 1;
            padding: 12px;
            background: var(--accent-gold);
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s ease;
        }
        .modal .btn-group .submit-btn:hover { background: var(--accent-gold-hover); }
        .modal .btn-group .cancel-btn {
            padding: 12px 20px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s ease;
        }
        .modal .btn-group .cancel-btn:hover { background: rgba(255,255,255,0.1); }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            z-index: 2000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s ease;
            max-width: 360px;
        }
        .toast.visible { transform: translateY(0); opacity: 1; }
        .toast.success { border-color: var(--success); border-left: 4px solid var(--success); }
        .toast.error { border-color: var(--danger); border-left: 4px solid var(--danger); }
        .toast.info { border-color: var(--accent-gold); border-left: 4px solid var(--accent-gold); }

        .footer {
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            body { padding: 12px; }
            .modal { padding: 20px 16px; }
            #authScreen { padding: 20px 16px; }
            .header { flex-direction: column; align-items: flex-start; }
            .client-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 480px) {
            .modal .btn-group { flex-direction: column; }
            .modal .btn-group .cancel-btn { padding: 10px; }
        }
    </style>
</head>
<body>

    <div class="container">

        <header class="header">
            <div class="logo" onclick="window.location.reload()">
                <div class="logo-icon">TS</div>
                <div class="logo-text">Tradesphere<span>Hub</span></div>
            </div>
            <nav class="nav">
                <a href="index.html">🏠 Home</a>
                <a class="active" href="#">📦 Portal</a>
                <a href="tracking.html">📊 Tracking</a>
            </nav>
        </header>

        <!-- AUTH SCREEN -->
        <div id="authScreen">
            <h2>🔐 Admin Access</h2>
            <p>Enter your admin password to continue.</p>
            <input type="password" id="adminPassword" placeholder="Enter admin password..." autofocus />
            <button class="auth-btn" id="authBtn">Access Dashboard</button>
            <div class="auth-error" id="authError">Incorrect password. Please try again.</div>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboard">
            <div class="toolbar">
                <button class="add-btn" id="addClientBtn">+ Add Client</button>
            </div>
            <div class="client-grid" id="clientGrid"></div>
        </div>

        <!-- MODAL -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal">
                <h2 id="modalTitle">Add New Client</h2>
                <div class="subtitle" id="modalSubtitle">Enter client details below.</div>

                <label>Client Name *</label>
                <input type="text" id="clientName" placeholder="e.g., John Smith" />

                <label>Client Email</label>
                <input type="email" id="clientEmail" placeholder="e.g., john@example.com" />

                <label>Password *</label>
                <input type="text" id="clientPasswordInputModal" placeholder="Set a password for this client" />

                <!-- Upload Section -->
                <div id="uploadFileSection" style="display:none;">
                    <label>Upload Log File</label>
                    <div class="file-upload-area" id="fileUploadArea">
                        <div class="icon">📁</div>
                        <p>Tap to select or <span class="browse">browse</span></p>
                        <input type="file" id="fileInput" accept=".txt,.log,.csv,.json" style="display:none" />
                    </div>
                    <div class="file-info" id="fileInfo">
                        <span id="fileNameDisplay">file.log</span>
                        <span class="remove" id="removeFileBtn">✕</span>
                    </div>
                </div>

                <div class="btn-group">
                    <button class="submit-btn" id="modalSubmitBtn">Save Client</button>
                    <button class="cancel-btn" id="modalCancelBtn">Cancel</button>
                </div>
            </div>
        </div>

        <div class="toast" id="toast"></div>

        <div class="footer">
            <p>© 2026 Tradesphere Hub · Client Portal · Test</p>
        </div>

    </div>

    <script>
        (function() {
            'use strict';

            const ADMIN_PASSWORD = 'admindelight200515$$';
            let isAdmin = false;
            let clients = [];
            let uploadClientId = null;
            let selectedFile = null;
            let selectedFileName = '';

            // DOM REFS
            const authScreen = document.getElementById('authScreen');
            const dashboard = document.getElementById('dashboard');
            const adminPassword = document.getElementById('adminPassword');
            const authBtn = document.getElementById('authBtn');
            const authError = document.getElementById('authError');

            const addClientBtn = document.getElementById('addClientBtn');
            const modalOverlay = document.getElementById('modalOverlay');
            const modalTitle = document.getElementById('modalTitle');
            const modalSubtitle = document.getElementById('modalSubtitle');
            const clientName = document.getElementById('clientName');
            const clientEmail = document.getElementById('clientEmail');
            const clientPasswordInputModal = document.getElementById('clientPasswordInputModal');
            const modalSubmitBtn = document.getElementById('modalSubmitBtn');
            const modalCancelBtn = document.getElementById('modalCancelBtn');

            const uploadFileSection = document.getElementById('uploadFileSection');
            const fileUploadArea = document.getElementById('fileUploadArea');
            const fileInput = document.getElementById('fileInput');
            const fileInfo = document.getElementById('fileInfo');
            const fileNameDisplay = document.getElementById('fileNameDisplay');
            const removeFileBtn = document.getElementById('removeFileBtn');

            const clientGrid = document.getElementById('clientGrid');
            const toast = document.getElementById('toast');

            // UTILITY
            function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

            function escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function showToast(message, type) {
                type = type || 'info';
                toast.textContent = message;
                toast.className = 'toast ' + type + ' visible';
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(function() { toast.classList.remove('visible'); }, 3000);
            }

            // STORAGE
            function loadClients() {
                try {
                    const data = localStorage.getItem('tradesphere_clients_v3');
                    if (data) {
                        clients = JSON.parse(data);
                    } else {
                        clients = [{
                            id: 'demo1',
                            name: 'Denmark TikTok Client',
                            email: 'demo@example.com',
                            password: 'demo123',
                            logs: [],
                            createdAt: Date.now() - 172800000
                        }];
                        saveClients();
                    }
                } catch (e) { clients = []; }
                return clients;
            }

            function saveClients() {
                localStorage.setItem('tradesphere_clients_v3', JSON.stringify(clients));
            }

            // RENDER
            function renderDashboard() {
                loadClients();

                if (clients.length === 0) {
                    clientGrid.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📂</div>
                            <h3>No clients yet</h3>
                            <p>Click "Add Client" to get started.</p>
                        </div>
                    `;
                    return;
                }

                var html = '';
                for (var i = 0; i < clients.length; i++) {
                    var client = clients[i];
                    var logCount = client.logs ? client.logs.length : 0;

                    html += `
                        <div class="client-card">
                            <div class="name">👤 ${escapeHtml(client.name)}</div>
                            <div class="email">📧 ${escapeHtml(client.email || 'No email')}</div>
                            <div class="log-count">📄 <span>${logCount}</span> log(s)</div>
                            <div class="actions">
                                <button class="upload-btn" data-id="${client.id}">📤 Upload</button>
                                <button class="delete-btn" data-id="${client.id}">🗑️ Delete</button>
                            </div>
                        </div>
                    `;
                }
                clientGrid.innerHTML = html;

                // Upload buttons
                document.querySelectorAll('.upload-btn').forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        var id = this.dataset.id;
                        openUploadModal(id);
                    });
                });

                // Delete buttons
                document.querySelectorAll('.delete-btn').forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        var id = this.dataset.id;
                        var client = null;
                        for (var j = 0; j < clients.length; j++) {
                            if (clients[j].id === id) { client = clients[j]; break; }
                        }
                        if (confirm('Delete "' + (client ? client.name : 'this client') + '"?')) {
                            clients = clients.filter(function(c) { return c.id !== id; });
                            saveClients();
                            renderDashboard();
                            showToast('Client deleted.', 'info');
                        }
                    });
                });
            }

            // AUTH
            function login() {
                var password = adminPassword.value.trim();
                if (password === ADMIN_PASSWORD) {
                    isAdmin = true;
                    authScreen.style.display = 'none';
                    dashboard.style.display = 'block';
                    authError.style.display = 'none';
                    adminPassword.value = '';
                    renderDashboard();
                    showToast('Welcome back!', 'success');
                } else {
                    authError.style.display = 'block';
                    setTimeout(function() { authError.style.display = 'none'; }, 3000);
                }
            }

            // OPEN UPLOAD MODAL
            function openUploadModal(clientId) {
                uploadClientId = clientId;
                var client = null;
                for (var i = 0; i < clients.length; i++) {
                    if (clients[i].id === clientId) { client = clients[i]; break; }
                }

                if (!client) {
                    showToast('Client not found.', 'error');
                    return;
                }

                modalTitle.textContent = 'Upload Log for ' + client.name;
                modalSubtitle.textContent = 'Upload a new log file for this client.';

                // Hide client fields, show upload
                document.getElementById('clientName').style.display = 'none';
                document.getElementById('clientEmail').style.display = 'none';
                document.getElementById('clientPasswordInputModal').style.display = 'none';
                document.querySelector('label[for="clientName"]').style.display = 'none';
                document.querySelector('label[for="clientEmail"]').style.display = 'none';
                document.querySelector('label[for="clientPasswordInputModal"]').style.display = 'none';
                uploadFileSection.style.display = 'block';

                modalSubmitBtn.textContent = 'Upload Log';

                selectedFile = null;
                selectedFileName = '';
                fileInfo.classList.remove('visible');
                fileInput.value = '';

                modalOverlay.classList.add('active');
                console.log('Upload modal opened for client:', client.name);
            }

            // OPEN ADD CLIENT MODAL
            function openAddClientModal() {
                uploadClientId = null;
                modalTitle.textContent = 'Add New Client';
                modalSubtitle.textContent = 'Enter client details below.';

                document.getElementById('clientName').style.display = 'block';
                document.getElementById('clientEmail').style.display = 'block';
                document.getElementById('clientPasswordInputModal').style.display = 'block';
                document.querySelector('label[for="clientName"]').style.display = 'block';
                document.querySelector('label[for="clientEmail"]').style.display = 'block';
                document.querySelector('label[for="clientPasswordInputModal"]').style.display = 'block';
                uploadFileSection.style.display = 'none';

                clientName.value = '';
                clientEmail.value = '';
                clientPasswordInputModal.value = '';

                modalSubmitBtn.textContent = 'Save Client';

                modalOverlay.classList.add('active');
                console.log('Add client modal opened');
            }

            // CLOSE MODAL
            function closeModal() {
                modalOverlay.classList.remove('active');
                uploadClientId = null;
                selectedFile = null;
                selectedFileName = '';
                fileInfo.classList.remove('visible');
                fileInput.value = '';
                console.log('Modal closed');
            }

            // SAVE OR UPLOAD
            function saveClientOrUpload() {
                console.log('Submit button clicked. uploadClientId:', uploadClientId);

                if (uploadClientId) {
                    // UPLOAD LOG
                    var client = null;
                    for (var i = 0; i < clients.length; i++) {
                        if (clients[i].id === uploadClientId) { client = clients[i]; break; }
                    }

                    if (!client) {
                        showToast('Client not found.', 'error');
                        return;
                    }

                    if (!selectedFile) {
                        showToast('Please select a log file to upload.', 'error');
                        return;
                    }

                    var reader = new FileReader();
                    reader.onload = function(e) {
                        var content = e.target.result;
                        if (!client.logs) client.logs = [];
                        client.logs.push({
                            id: generateId(),
                            filename: selectedFileName,
                            content: content,
                            uploadedAt: Date.now(),
                            views: 0,
                            lastViewed: null
                        });
                        saveClients();
                        closeModal();
                        renderDashboard();
                        showToast('📤 Log uploaded for ' + client.name, 'success');
                        console.log('Log uploaded for:', client.name);
                    };
                    reader.readAsText(selectedFile);

                } else {
                    // ADD NEW CLIENT
                    var name = clientName.value.trim();
                    var email = clientEmail.value.trim();
                    var password = clientPasswordInputModal.value.trim();

                    console.log('Adding client:', name, email, password);

                    if (!name) { showToast('Please enter a client name.', 'error'); return; }
                    if (!password) { showToast('Please set a password for the client.', 'error'); return; }

                    var newClient = {
                        id: generateId(),
                        name: name,
                        email: email || '',
                        password: password,
                        logs: [],
                        createdAt: Date.now()
                    };

                    clients.push(newClient);
                    saveClients();
                    closeModal();
                    renderDashboard();
                    showToast('✅ Client ' + name + ' added!', 'success');
                    console.log('Client added:', newClient);
                }
            }

            // FILE HANDLING
            fileUploadArea.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                console.log('File upload area clicked');
                fileInput.click();
            });

            fileInput.addEventListener('change', function() {
                console.log('File input changed');
                if (this.files && this.files.length > 0) {
                    var file = this.files[0];
                    console.log('File selected:', file.name, file.size);
                    if (file.size > 10 * 1024 * 1024) {
                        showToast('File too large. Maximum 10MB.', 'error');
                        this.value = '';
                        return;
                    }
                    selectedFile = file;
                    selectedFileName = file.name;
                    fileNameDisplay.textContent = file.name;
                    fileInfo.classList.add('visible');
                }
            });

            removeFileBtn.addEventListener('click', function() {
                selectedFile = null;
                selectedFileName = '';
                fileInfo.classList.remove('visible');
                fileInput.value = '';
                console.log('File removed');
            });

            // EVENT LISTENERS
            authBtn.addEventListener('click', login);
            adminPassword.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') login();
            });

            addClientBtn.addEventListener('click', function() {
                console.log('Add Client button clicked');
                openAddClientModal();
            });

            modalCancelBtn.addEventListener('click', closeModal);
            modalSubmitBtn.addEventListener('click', saveClientOrUpload);

            modalOverlay.addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });

            // INIT
            loadClients();
            console.log('📦 Portal Test loaded');
            console.log('👥 Clients:', clients.length);
            console.log('🔑 Admin password: admindelight200515$$');

        })();
    </script>
